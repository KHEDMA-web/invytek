<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b1330" />
<title>Mariage Royal — Yasmine &amp; Karim</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Pinyon+Script&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --navy:#0b1330; --navy-2:#101b42; --card:#0e1738; --card-2:#13204c;
    --gold:#C29A4B; --gold-vivid:#E7C76C; --gold-light:#F3E2A8; --gold-soft:rgba(194,154,75,.45);
    --ivory:#F6F1E4; --text:rgba(246,241,228,.84); --text-soft:rgba(246,241,228,.52); --text-faint:rgba(246,241,228,.32);
  }
  html { -webkit-font-smoothing:antialiased; scroll-behavior:smooth; }
  body {
    min-height:100vh; min-height:100dvh;
    background:radial-gradient(120% 75% at 50% -8%, #16234f 0%, var(--navy) 60%), var(--navy);
    color:var(--text); font-family:'Cormorant Garamond',serif;
    display:flex; align-items:center; justify-content:center;
    padding:calc(2.5rem + env(safe-area-inset-top)) 1.2rem calc(2.5rem + env(safe-area-inset-bottom));
    overflow-x:hidden;
  }

  /* damask texture */
  .damask { position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.05;
    background-image:radial-gradient(circle at 25% 25%, var(--gold-vivid) 1.2px, transparent 1.6px),
                     radial-gradient(circle at 75% 75%, var(--gold-vivid) 1.2px, transparent 1.6px);
    background-size:46px 46px; mask-image:radial-gradient(circle at 50% 45%, #000 0%, transparent 78%); }

  .scene { width:100%; max-width:460px; position:relative; z-index:2; }
  .card {
    position:relative; width:100%;
    background:linear-gradient(172deg, var(--card-2) 0%, var(--card) 100%);
    border:1px solid var(--gold-soft);
    padding:3.4rem 2.4rem 3.2rem; text-align:center; overflow:hidden;
    box-shadow:0 50px 120px -40px rgba(0,0,0,.85), inset 0 1px 0 rgba(255,255,255,.04);
  }
  .card::before { content:''; position:absolute; inset:13px; border:1px solid var(--gold-soft); pointer-events:none; }
  .card::after { content:''; position:absolute; inset:18px; border:1px solid rgba(194,154,75,.18); pointer-events:none; }

  /* corner filigree */
  .corner { position:absolute; width:96px; height:96px; z-index:1; opacity:.92; }
  .corner.tl { top:6px; left:6px; }
  .corner.tr { top:6px; right:6px; transform:scaleX(-1); }
  .corner.bl { bottom:6px; left:6px; transform:scaleY(-1); }
  .corner.br { bottom:6px; right:6px; transform:scale(-1,-1); }

  /* crown */
  .crown { width:108px; height:auto; margin:0 auto .4rem; display:block; position:relative; z-index:2;
    filter:drop-shadow(0 6px 18px rgba(231,199,108,.3)); }
  .crown .jewel { animation:twinkle 2.6s ease-in-out infinite; transform-origin:center; }
  .crown .jewel:nth-child(2){animation-delay:.5s;} .crown .jewel:nth-child(3){animation-delay:1s;} .crown .jewel:nth-child(4){animation-delay:1.5s;}
  @keyframes twinkle { 0%,100%{opacity:1;} 50%{opacity:.45;} }

  .rev { opacity:0; transform:translateY(14px); animation:rise .85s cubic-bezier(.16,1,.3,1) forwards; }
  @keyframes rise { to { opacity:1; transform:translateY(0); } }

  .eyebrow { font-family:'Marcellus',serif; font-size:.74rem; letter-spacing:.4em; text-transform:uppercase;
    color:var(--gold-vivid); text-indent:.4em; position:relative; z-index:2; }
  .honor { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.14rem; color:var(--text-soft);
    line-height:1.6; margin-top:1.3rem; max-width:32ch; margin-inline:auto; }

  .names { font-family:'Pinyon Script',cursive; font-size:clamp(3rem,15vw,4.4rem); line-height:.92;
    color:var(--ivory); margin-top:1rem;
    background:linear-gradient(180deg,var(--gold-light),var(--gold) 90%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    text-shadow:0 0 30px rgba(231,199,108,.18); }
  .amp { display:block; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.3rem; color:var(--text-soft);
    -webkit-text-fill-color:var(--text-soft); margin:.1rem 0; }

  .sep { display:flex; align-items:center; justify-content:center; gap:.9rem; margin:1.7rem auto; width:70%; }
  .sep .ln { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--gold-soft)); }
  .sep .ln.r { background:linear-gradient(90deg,var(--gold-soft),transparent); }
  .sep svg { width:16px; height:22px; flex-shrink:0; }

  .info { font-family:'Cormorant Garamond',serif; font-size:1.22rem; color:var(--text); line-height:1.7; }
  .info .big { font-family:'Marcellus',serif; font-size:1.05rem; letter-spacing:.16em; text-transform:uppercase; color:var(--gold-vivid); text-indent:.16em; display:block; margin-bottom:.2rem; }
  .info .place { font-style:italic; color:var(--gold-light); }

  .countdown { display:flex; justify-content:center; gap:1rem; margin:2.1rem 0 .2rem; }
  .cd { display:flex; flex-direction:column; align-items:center; min-width:56px; padding:.75rem .4rem;
    border:1px solid var(--gold-soft); background:rgba(194,154,75,.06); }
  .cd .num { font-family:'Marcellus',serif; font-size:1.6rem; color:var(--ivory); line-height:1; font-variant-numeric:tabular-nums; }
  .cd .lab { font-family:'Cormorant Garamond',serif; font-size:.66rem; letter-spacing:.16em; text-transform:uppercase; color:var(--text-faint); margin-top:.45rem; text-indent:.16em; }

  .cta { margin-top:2.3rem; display:flex; gap:.8rem; justify-content:center; flex-wrap:wrap; position:relative; z-index:2; }
  .btn { display:inline-flex; align-items:center; gap:.5rem; font-family:'Marcellus',serif; font-size:.72rem; letter-spacing:.16em;
    text-transform:uppercase; text-indent:.16em; padding:.92rem 1.6rem; cursor:pointer; text-decoration:none; transition:all .3s ease; }
  .btn-primary { background:linear-gradient(135deg,var(--gold-vivid),var(--gold)); color:#10183a; border:1px solid transparent;
    box-shadow:0 8px 24px -8px rgba(231,199,108,.5); }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 12px 30px -8px rgba(231,199,108,.7); }
  .btn-ghost { background:transparent; color:var(--text-soft); border:1px solid var(--gold-soft); }
  .btn-ghost:hover { color:var(--gold-vivid); border-color:var(--gold); transform:translateY(-2px); }
  .btn svg { width:15px; height:15px; }

  /* ════ GATE ════ */
  #gate { position:fixed; inset:0; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:radial-gradient(120% 80% at 50% 35%, #16234f, var(--navy) 72%); text-align:center; padding:2rem;
    transition:opacity .9s ease, visibility 0s .9s; }
  #gate.opened { opacity:0; visibility:hidden; }
  #gate .crown { width:150px; margin-bottom:1.4rem; animation:crownIn 1.1s cubic-bezier(.16,1,.3,1) forwards; }
  @keyframes crownIn { from{transform:translateY(-20px) scale(.85);} to{transform:none;} }
  .gate-title { font-family:'Marcellus',serif; font-size:1.4rem; letter-spacing:.32em; text-transform:uppercase; color:var(--gold-vivid); text-indent:.32em; }
  .gate-names { font-family:'Pinyon Script',cursive; font-size:3rem; color:var(--ivory); margin-top:.4rem;
    background:linear-gradient(180deg,var(--gold-light),var(--gold)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .gate-btn { margin-top:2rem; font-family:'Marcellus',serif; font-size:.74rem; letter-spacing:.18em; text-transform:uppercase;
    text-indent:.18em; padding:.95rem 2rem; cursor:pointer; color:var(--ivory); background:transparent; border:1px solid var(--gold);
    transition:all .3s ease; }
  .gate-btn:hover { background:rgba(194,154,75,.16); transform:translateY(-2px); }

  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--card-2); color:var(--ivory);
    font-family:'Cormorant Garamond',serif; font-size:1rem; padding:.8rem 1.5rem; border:1px solid var(--gold); opacity:0;
    pointer-events:none; transition:all .4s ease; z-index:120; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width:430px) { .card { padding:2.6rem 1.5rem 2.6rem; } .corner{width:74px;height:74px;} }
  @media (prefers-reduced-motion:reduce) { .rev{animation:none;opacity:1;transform:none;} .crown,.crown .jewel{animation:none;} #gate .crown{animation:none;} }
</style>
</head>
<body>

<div class="damask"></div>

<!-- crown SVG template -->
<template id="crownTpl">
  <svg class="crown" viewBox="0 0 120 92" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M12 78 L18 34 L40 58 L60 22 L80 58 L102 34 L108 78 Z" fill="url(#cg)" stroke="#8A6A28" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M12 78 L108 78 L106 88 L14 88 Z" fill="url(#cg2)" stroke="#8A6A28" stroke-width="1"/>
    <circle class="jewel" cx="60" cy="14" r="5.5" fill="#E7C76C"/>
    <circle class="jewel" cx="18" cy="30" r="4" fill="#F3E2A8"/>
    <circle class="jewel" cx="102" cy="30" r="4" fill="#F3E2A8"/>
    <circle class="jewel" cx="60" cy="83" r="3.4" fill="#B23A4A"/>
    <circle cx="40" cy="83" r="2.6" fill="#7BA8D8"/><circle cx="80" cy="83" r="2.6" fill="#7BA8D8"/>
    <path d="M60 4 L60 14 M55 8 L65 8" stroke="#E7C76C" stroke-width="2" stroke-linecap="round"/>
    <defs>
      <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3E2A8"/><stop offset="1" stop-color="#B88A38"/></linearGradient>
      <linearGradient id="cg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E7C76C"/><stop offset="1" stop-color="#9C742E"/></linearGradient>
    </defs>
  </svg>
</template>

<!-- corner filigree template -->
<template id="cornerTpl">
  <svg class="corner" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <g stroke="#C29A4B" stroke-width="1.1" stroke-linecap="round" fill="none">
      <path d="M6 6 C40 10 70 30 78 70"/>
      <path d="M6 6 C10 40 30 70 70 78"/>
      <path d="M20 10 C36 16 44 30 40 46 C30 38 22 26 20 10Z" fill="rgba(194,154,75,.16)"/>
      <path d="M10 20 C16 36 30 44 46 40 C38 30 26 22 10 20Z" fill="rgba(194,154,75,.16)"/>
      <path d="M44 24 C60 30 68 46 64 64 C50 54 44 40 44 24Z" fill="rgba(194,154,75,.1)"/>
      <path d="M24 44 C30 60 46 68 64 64 C54 50 40 44 24 44Z" fill="rgba(194,154,75,.1)"/>
      <circle cx="6" cy="6" r="3" fill="#E7C76C"/>
    </g>
  </svg>
</template>

<!-- GATE -->
<div id="gate">
  <div id="gateCrown"></div>
  <div class="gate-title">Invitation</div>
  <div class="gate-names" data-gate-names>Yasmine &amp; Karim</div>
  <button class="gate-btn" onclick="openGate()">Ouvrir l'invitation</button>
</div>

<!-- CARD -->
<div class="scene">
  <div class="card" id="card">
    <div id="cTL"></div><div id="cTR"></div><div id="cBL"></div><div id="cBR"></div>
    <div id="cardCrown"></div>

    <div class="eyebrow rev" style="animation-delay:.1s" data-f="eyebrow">Avec la bénédiction de Dieu</div>
    <p class="honor rev" style="animation-delay:.18s" data-f="honor">Les familles Belkacem &amp; Ouali ont l'honneur de vous convier au mariage de leurs enfants</p>

    <div class="names rev" style="animation-delay:.3s"><span data-f="name1">Yasmine</span><span class="amp">&amp;</span><span data-f="name2">Karim</span></div>

    <div class="sep rev" style="animation-delay:.42s"><span class="ln"></span>
      <svg viewBox="0 0 24 32" fill="none"><path d="M12 1 L15 9 L12 13 L9 9 Z M12 13 C9 20 9 26 12 31 C15 26 15 20 12 13Z" fill="#C29A4B"/></svg>
      <span class="ln r"></span></div>

    <p class="info rev" style="animation-delay:.5s"><span class="big" data-f="day">Samedi 20 Juin 2026</span><span data-f="time">à partir de 19h00</span><br><span class="place" data-f="place">Palais des Roses · Hydra, Alger</span></p>

    <div class="countdown rev" style="animation-delay:.6s" id="countdown">
      <div class="cd"><span class="num" id="cd-j">––</span><span class="lab">Jours</span></div>
      <div class="cd"><span class="num" id="cd-h">––</span><span class="lab">Heures</span></div>
      <div class="cd"><span class="num" id="cd-m">––</span><span class="lab">Min</span></div>
    </div>

    <div class="cta rev" style="animation-delay:.7s">
      <button class="btn btn-primary" onclick="saveDate()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>
        Confirmer ma présence
      </button>
      <a class="btn btn-ghost" data-map href="https://www.google.com/maps/search/?api=1&query=Palais+des+Roses+Hydra+Alger" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.5-7-11a7 7 0 0 1 14 0c0 4.5-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>
        Itinéraire
      </a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // mount crowns + corners from templates
  document.getElementById('gateCrown').appendChild(document.getElementById('crownTpl').content.cloneNode(true));
  document.getElementById('cardCrown').appendChild(document.getElementById('crownTpl').content.cloneNode(true));
  ['cTL','cTR','cBL','cBR'].forEach((id,i)=>{ const c=document.getElementById('cornerTpl').content.cloneNode(true); const node=document.getElementById(id); node.replaceWith(node.cloneNode(false)); document.getElementById(id).appendChild(c); document.getElementById(id).firstElementChild.classList.add(['tl','tr','bl','br'][i]); });

  let opened=false;
  function openGate(){ if(opened) return; opened=true; document.getElementById('gate').classList.add('opened'); }

  let cdTarget=new Date('2026-06-20T19:00:00').getTime();
  window.setEventDate=function(iso){ const t=new Date(iso).getTime(); if(!isNaN(t)){ cdTarget=t; updateCountdown(); } };
  function updateCountdown(){
    let diff=cdTarget-Date.now();
    if(diff<0){ document.getElementById('countdown').style.display='none'; return; }
    document.getElementById('countdown').style.display='';
    const j=Math.floor(diff/86400000); diff%=86400000;
    const h=Math.floor(diff/3600000); diff%=3600000;
    const m=Math.floor(diff/60000);
    document.getElementById('cd-j').textContent=j;
    document.getElementById('cd-h').textContent=String(h).padStart(2,'0');
    document.getElementById('cd-m').textContent=String(m).padStart(2,'0');
  }
  updateCountdown(); setInterval(updateCountdown,30000);

  setTimeout(function(){ document.querySelectorAll('.rev').forEach(function(e){ e.style.opacity='1'; e.style.transform='none'; }); }, 1800);

  window.INVYTEK_CONFIG={
    theme:'couronne-royale', accent:'#E7C76C', accent2:'#C29A4B', backHref:'../themes.html',
    fields:[
      {key:'logo', label:'Logo / monogramme (PNG, optionnel)', type:'image', mount:'.card'},
      {key:'eyebrow', label:'Mention d\'ouverture', sel:'[data-f="eyebrow"]', type:'text'},
      {key:'honor', label:'Texte d\'honneur', sel:'[data-f="honor"]', type:'textarea'},
      {key:'name1', label:'Prénom 1', sel:'[data-f="name1"]', type:'text'},
      {key:'name2', label:'Prénom 2', sel:'[data-f="name2"]', type:'text'},
      {key:'gnames', label:'Noms (écran d\'ouverture)', sel:'[data-gate-names]', type:'text'},
      {key:'day', label:'Date', sel:'[data-f="day"]', type:'text'},
      {key:'time', label:'Heure', sel:'[data-f="time"]', type:'text'},
      {key:'place', label:'Lieu', sel:'[data-f="place"]', type:'text'},
      {key:'map', label:'Lien itinéraire (Google Maps)', sel:'[data-map]', attr:'href', type:'text'},
      {key:'iso', label:'Date & heure (compte à rebours)', type:'datetime', val:'2026-06-20T19:00'}
    ]
  };

  function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
  function saveDate(){
    const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Invytek//FR','BEGIN:VEVENT',
      'DTSTART:20260620T190000','DTEND:20260620T235900','SUMMARY:Mariage Yasmine & Karim',
      'LOCATION:Palais des Roses\\, Hydra\\, Alger','END:VEVENT','END:VCALENDAR'].join('\r\n');
    const blob=new Blob([ics],{type:'text/calendar'}); const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download='mariage-royal.ics'; a.click();
    toast('Présence confirmée — date enregistrée');
  }
</script>
<script src="../assets/editor.js"></script>
</body>
</html>
