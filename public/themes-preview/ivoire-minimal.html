<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#14100a" />
<title>Nour & Adam — Mariage</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Marcellus&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:#14100a; --bg-2:#1a160f; --card-1:#221b12; --card-2:#191409;
    --ivory:#FCFAF5; --ivory-warm:#F7F1E6;
    --gold:#B8923C; --gold-vivid:#D4AF61; --gold-light:#E8D8B0; --gold-line:#6E5618;
    --hair:rgba(184,146,60,.22); --hair-strong:rgba(184,146,60,.5);
    --text:rgba(247,241,230,.86); --text-soft:rgba(247,241,230,.5); --text-faint:rgba(247,241,230,.3);
  }
  html { -webkit-font-smoothing:antialiased; scroll-behavior:smooth; }
  body {
    min-height:100vh; min-height:100dvh;
    background:radial-gradient(130% 75% at 50% -8%, #241c11 0%, var(--bg) 58%), var(--bg);
    color:var(--text); font-family:'Cormorant Garamond',serif;
    display:flex; align-items:center; justify-content:center;
    padding:calc(3rem + env(safe-area-inset-top)) 1.2rem calc(3rem + env(safe-area-inset-bottom));
    overflow-x:hidden;
  }
  .glow { position:fixed; border-radius:50%; filter:blur(90px); pointer-events:none; z-index:0; }
  .glow.a { width:360px; height:360px; background:rgba(184,146,60,.10); top:-80px; left:50%; transform:translateX(-50%); }

  .scene { width:100%; max-width:440px; position:relative; z-index:2; }
  .card {
    position:relative; width:100%;
    background:linear-gradient(168deg, var(--card-1) 0%, var(--card-2) 100%);
    padding:3.4rem 2.4rem 3rem; text-align:center;
    box-shadow:0 60px 120px -45px rgba(0,0,0,.85), inset 0 1px 0 rgba(255,250,245,.05);
    outline:1px solid var(--hair); outline-offset:-1px;
  }
  .card::before { content:''; position:absolute; inset:11px; border:1px solid var(--hair); pointer-events:none; }
  .card::after { content:''; position:absolute; inset:15px; border:1px solid rgba(184,146,60,.1); pointer-events:none; }

  /* top drawn line */
  .topline { position:absolute; top:26px; left:26px; right:26px; height:1px; overflow:visible; }
  .topline svg { width:100%; height:1px; overflow:visible; display:block; }
  .topline path { stroke:var(--gold); stroke-width:1; fill:none; stroke-dasharray:1; stroke-dashoffset:1; animation:draw 1.5s ease .5s forwards; }
  @keyframes draw { to { stroke-dashoffset:0; } }

  .rev { opacity:0; transform:translateY(14px); animation:rise .9s cubic-bezier(.16,1,.3,1) forwards; }
  @keyframes rise { to { opacity:1; transform:translateY(0); } }

  /* monogram medallion */
  .medallion { width:74px; height:74px; margin:1.2rem auto 0; position:relative; display:flex; align-items:center; justify-content:center; }
  .medallion .ring { position:absolute; inset:0; border:1px solid var(--hair-strong); border-radius:50%; }
  .medallion .ring.inner { inset:7px; border-color:rgba(184,146,60,.25); }
  .medallion .mg { font-family:'Marcellus',serif; font-size:1.12rem; letter-spacing:.04em; color:var(--gold-vivid); white-space:nowrap; }
  .medallion .dot { position:absolute; width:5px; height:5px; background:var(--gold); transform:rotate(45deg); top:-2px; left:50%; margin-left:-2.5px; }

  .kicker { font-family:'Cormorant Garamond',serif; font-weight:400; font-size:.92rem; letter-spacing:.4em;
    text-transform:uppercase; color:var(--gold); text-indent:.4em; margin-top:1.6rem; }

  .names { margin:1rem 0 .6rem; }
  .names .n { font-family:'Pinyon Script',cursive; font-size:clamp(3.2rem,15vw,4.8rem); line-height:.86; color:var(--ivory);
    display:block; text-shadow:0 2px 26px rgba(184,146,60,.16); }
  .names .et { font-family:'Pinyon Script',cursive; font-size:clamp(1.5rem,6.5vw,2.1rem); color:var(--gold-vivid); display:block; margin:.05rem 0; line-height:1; }

  .divider { display:flex; align-items:center; justify-content:center; gap:.9rem; margin:1.8rem auto; width:64%; }
  .divider .ln { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--hair-strong)); }
  .divider .ln.r { background:linear-gradient(90deg,var(--hair-strong),transparent); }
  .divider .dia { width:8px; height:8px; transform:rotate(45deg); border:1px solid var(--gold); position:relative; flex-shrink:0; }
  .divider .dia::after { content:''; position:absolute; inset:2px; background:var(--gold); }

  .date { font-family:'Marcellus',serif; font-size:1.02rem; letter-spacing:.26em; text-transform:uppercase; color:var(--ivory-warm); text-indent:.26em; }
  .time { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.18rem; color:var(--text-soft); margin-top:.5rem; }
  .venue { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:500; font-size:1.34rem; color:var(--gold-light); margin-top:1.1rem; line-height:1.4; }

  .countdown { display:flex; justify-content:center; gap:1.5rem; margin:2.2rem 0 .3rem; }
  .cd { display:flex; flex-direction:column; align-items:center; position:relative; }
  .cd .num { font-family:'Marcellus',serif; font-size:1.85rem; color:var(--ivory); line-height:1; font-variant-numeric:tabular-nums; }
  .cd .lab { font-family:'Cormorant Garamond',serif; font-size:.72rem; letter-spacing:.2em; text-transform:uppercase; color:var(--text-faint); margin-top:.5rem; text-indent:.2em; }
  .cd + .cd::before { content:''; position:absolute; left:-.78rem; top:.15rem; height:1.5rem; width:1px; background:var(--hair); }

  .cta { margin-top:2.4rem; display:flex; gap:.8rem; justify-content:center; flex-wrap:wrap; }
  .btn { display:inline-flex; align-items:center; gap:.5rem; font-family:'Marcellus',serif; font-size:.72rem; letter-spacing:.18em;
    text-transform:uppercase; text-indent:.18em; padding:.95rem 1.6rem; cursor:pointer; text-decoration:none;
    border:1px solid var(--gold); background:transparent; color:var(--ivory); transition:all .3s ease; }
  .btn:hover { background:rgba(184,146,60,.12); transform:translateY(-2px); }
  .btn.ghost { border-color:var(--hair); color:var(--text-soft); }
  .btn.ghost:hover { color:var(--ivory); border-color:var(--gold); }
  .btn svg { width:15px; height:15px; }

  /* ════ ENVELOPE GATE (opens upward) ════ */
  #gate { position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(120% 80% at 50% 30%, #241c11, var(--bg) 70%); transition:opacity .9s ease, visibility 0s .9s; }
  #gate.opened { opacity:0; visibility:hidden; }
  .env { position:relative; width:310px; height:208px; cursor:pointer; transform-style:preserve-3d;
    transition:transform 1s cubic-bezier(.7,0,.3,1), opacity .9s ease; }
  #gate.opened .env { transform:translateY(-60vh) scale(.9); opacity:0; }
  .env-body { position:absolute; inset:0; background:linear-gradient(168deg, #fff 0%, var(--ivory-warm) 100%);
    box-shadow:0 44px 90px -30px rgba(0,0,0,.72), inset 0 0 0 1px rgba(110,86,24,.12); }
  .env-body::after { content:''; position:absolute; inset:9px; border:1px solid rgba(110,86,24,.14); pointer-events:none; }
  .env-flap { position:absolute; top:0; left:0; width:100%; height:56%; transform-origin:top center;
    background:linear-gradient(168deg,#fff,#f3ebdd); clip-path:polygon(0 0,100% 0,50% 100%);
    transition:transform 1s cubic-bezier(.7,0,.3,1); z-index:4;
    filter:drop-shadow(0 5px 8px rgba(94,72,20,.12)); }
  #gate.opening .env-flap, #gate.opened .env-flap { transform:rotateX(180deg); z-index:0; }

  /* wax seal — centered on flap tip */
  .seal { position:absolute; left:50%; top:56%; transform:translate(-50%,-50%); width:62px; height:62px; border-radius:50%; z-index:6;
    background:radial-gradient(circle at 38% 32%, var(--gold-vivid) 0%, var(--gold) 46%, var(--gold-line) 100%);
    box-shadow:0 8px 18px rgba(58,40,8,.4), inset 0 -4px 8px rgba(58,40,8,.45), inset 0 3px 6px rgba(255,240,210,.45);
    display:flex; align-items:center; justify-content:center; transition:transform .5s ease,opacity .4s; }
  .seal::after { content:''; position:absolute; inset:6px; border-radius:50%; border:1px solid rgba(255,245,220,.35); pointer-events:none; }
  .seal .amp { font-family:'Pinyon Script',cursive; font-size:2.1rem; line-height:1; color:#fff6e0; text-shadow:0 1px 2px rgba(58,40,8,.45); margin-top:-2px; }
  #gate.opening .seal { transform:translate(-50%,-50%) scale(.4); opacity:0; }

  .env-cap { position:absolute; left:0; right:0; top:80%; transform:translateY(-50%); text-align:center; z-index:3;
    font-family:'Marcellus',serif; font-size:.6rem; letter-spacing:.34em; text-transform:uppercase; text-indent:.34em; color:#8a763f; transition:opacity .4s; }
  #gate.opening .env-cap { opacity:0; }
  .gate-hint { position:absolute; bottom:-3.4rem; left:0; right:0; text-align:center; font-family:'Marcellus',serif; font-size:.66rem;
    letter-spacing:.26em; text-transform:uppercase; text-indent:.26em; color:var(--text-faint); animation:blink 2.2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:.35;} 50%{opacity:.9;} }

  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--bg-2); color:var(--ivory);
    font-family:'Cormorant Garamond',serif; font-size:1rem; padding:.8rem 1.5rem; border:1px solid var(--hair-strong); opacity:0;
    pointer-events:none; transition:all .4s ease; z-index:140; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width:430px) { .card { padding:2.8rem 1.6rem 2.6rem; } .env { width:260px; height:174px; } }
  @media (prefers-reduced-motion:reduce) { .rev,.topline path{animation:none!important;opacity:1;transform:none;stroke-dashoffset:0;} }
</style>
</head>
<body>

<div class="glow a"></div>

<!-- GATE -->
<div id="gate" onclick="openGate()">
  <div class="env">
    <div class="env-body"></div>
    <div class="env-flap"></div>
    <div class="seal"><span class="amp">&amp;</span></div>
    <div class="env-cap">Vous êtes invité(e)</div>
    <div class="gate-hint">Touchez pour ouvrir</div>
  </div>
</div>

<!-- CARD -->
<div class="scene">
  <div class="card">
    <div class="topline"><svg viewBox="0 0 400 1" preserveAspectRatio="none"><path d="M0 .5 H400"/></svg></div>

    <div class="medallion rev" style="animation-delay:.7s">
      <span class="dot"></span><span class="ring"></span><span class="ring inner"></span>
      <span class="mg" data-mono>N · A</span>
    </div>

    <div class="kicker rev" style="animation-delay:.8s" data-f="kicker">Invitation au mariage de</div>

    <div class="names">
      <span class="n rev" style="animation-delay:.9s" data-f="name1">Nour</span>
      <span class="et rev" style="animation-delay:1s">et</span>
      <span class="n rev" style="animation-delay:1.1s" data-f="name2">Adam</span>
    </div>

    <div class="divider rev" style="animation-delay:1.25s"><span class="ln"></span><span class="dia"></span><span class="ln r"></span></div>

    <div class="date rev" style="animation-delay:1.35s" data-f="date">Samedi 12 Septembre 2026</div>
    <div class="time rev" style="animation-delay:1.42s" data-f="time">à partir de 18h00</div>
    <div class="venue rev" style="animation-delay:1.5s" data-f="venue">Villa Les Oliviers — Hydra, Alger</div>

    <div class="countdown rev" style="animation-delay:1.6s" id="countdown">
      <div class="cd"><span class="num" id="cd-j">––</span><span class="lab">Jours</span></div>
      <div class="cd"><span class="num" id="cd-h">––</span><span class="lab">Heures</span></div>
      <div class="cd"><span class="num" id="cd-m">––</span><span class="lab">Min</span></div>
    </div>

    <div class="cta rev" style="animation-delay:1.7s">
      <button class="btn" onclick="saveDate()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>
        Confirmer
      </button>
      <a class="btn ghost" data-map href="https://www.google.com/maps/search/?api=1&query=Hydra+Alger" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.5-7-11a7 7 0 0 1 14 0c0 4.5-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>
        Itinéraire
      </a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let opened=false;
  function openGate(){ if(opened) return; opened=true; const g=document.getElementById('gate'); g.classList.add('opening'); setTimeout(()=>g.classList.add('opened'),650); }

  let cdTarget=new Date('2026-09-12T18:00:00').getTime();
  window.setEventDate=function(iso){ const t=new Date(iso).getTime(); if(!isNaN(t)){ cdTarget=t; updateCountdown(); } };
  function updateCountdown(){
    let diff=cdTarget-Date.now();
    if(diff<0){ document.getElementById('countdown').style.display='none'; return; }
    document.getElementById('countdown').style.display='';
    const j=Math.floor(diff/86400000); diff%=86400000;
    const h=Math.floor(diff/3600000); diff%=3600000;
    const m=Math.floor(diff/60000);
    document.getElementById('cd-j').textContent=j;
    document.getElementById('cd-h').textContent=String(h).padStart(2,'0');
    document.getElementById('cd-m').textContent=String(m).padStart(2,'0');
  }
  updateCountdown(); setInterval(updateCountdown,30000);
  setTimeout(function(){ document.querySelectorAll('.rev').forEach(function(e){ e.style.opacity='1'; e.style.transform='none'; }); }, 1900);

  function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
  function saveDate(){
    const n1=document.querySelector('[data-f="name1"]').textContent, n2=document.querySelector('[data-f="name2"]').textContent;
    const d=new Date(cdTarget); const pad=x=>String(x).padStart(2,'0');
    const dt=d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'T'+pad(d.getHours())+pad(d.getMinutes())+'00';
    const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Invytek//FR','BEGIN:VEVENT','DTSTART:'+dt,
      'SUMMARY:Mariage de '+n1+' & '+n2,'LOCATION:'+document.querySelector('[data-f="venue"]').textContent,'END:VEVENT','END:VCALENDAR'].join('\r\n');
    const blob=new Blob([ics],{type:'text/calendar'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='mariage.ics'; a.click();
    toast('Présence confirmée — date enregistrée');
  }

  // sync monogram from names
  function syncMono(){
    const n1=(document.querySelector('[data-f="name1"]').textContent.trim()[0]||'N').toUpperCase();
    const n2=(document.querySelector('[data-f="name2"]').textContent.trim()[0]||'A').toUpperCase();
    document.querySelectorAll('[data-mono]').forEach(e=>e.textContent=n1+' · '+n2);
    const s=document.querySelector('[data-seal]'); if(s) s.textContent=n1;
  }

  window.INVYTEK_CONFIG={
    theme:'ivoire-minimal', accent:'#D4AF61', accent2:'#B8923C', backHref:'/themes', onChange:syncMono,
    fields:[
      {key:'logo', label:'Logo (PNG transparent, optionnel)', type:'image', mount:'.card'},
      {key:'kicker', label:'Introduction', sel:'[data-f="kicker"]', type:'text'},
      {key:'name1', label:'Premier prénom', sel:'[data-f="name1"]', type:'text'},
      {key:'name2', label:'Second prénom', sel:'[data-f="name2"]', type:'text'},
      {key:'date', label:'Date (texte)', sel:'[data-f="date"]', type:'text'},
      {key:'time', label:'Horaire', sel:'[data-f="time"]', type:'text'},
      {key:'venue', label:'Lieu', sel:'[data-f="venue"]', type:'text'},
      {key:'map', label:'Lien itinéraire (Google Maps)', sel:'[data-map]', attr:'href', type:'text'},
      {key:'iso', label:'Date & heure (compte à rebours)', type:'datetime', val:'2026-09-12T18:00'}
    ]
  };
</script>
<script src="assets/editor.js"></script>
<script>syncMono();</script>
</body>
</html>
