<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#14100a" />
<title>Lina fête ses 40 ans !</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Marcellus&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:#14100a; --bg-2:#1c1710; --card:#1b1610;
    --gold:#B8923C; --gold-vivid:#D4AF61; --gold-light:#E8D8B0;
    --champ:#F0D080; --rose:#E8A080; --white:#F5F0E8; --bordeaux:#8B2F3F; --ivory:#FCFAF5;
    --text:rgba(245,240,232,.84); --text-soft:rgba(245,240,232,.52); --text-faint:rgba(245,240,232,.32);
  }
  html { -webkit-font-smoothing:antialiased; scroll-behavior:smooth; }
  body {
    min-height:100vh; min-height:100dvh;
    background:radial-gradient(130% 80% at 50% -5%, #251c10 0%, var(--bg) 60%), var(--bg);
    color:var(--text); font-family:'Cormorant Garamond',serif;
    display:flex; align-items:center; justify-content:center;
    padding:calc(2.5rem + env(safe-area-inset-top)) 1.2rem calc(2.5rem + env(safe-area-inset-bottom));
    overflow-x:hidden;
  }

  .rain { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .burst { position:fixed; inset:0; z-index:60; pointer-events:none; overflow:hidden; }
  .conf { position:absolute; width:9px; height:14px; border-radius:2px; opacity:0; }
  /* falling rain */
  .rain .conf { animation:confRain linear infinite; }
  @keyframes confRain {
    0%{ transform:translateY(-10vh) rotate(0); opacity:0; }
    12%{ opacity:.8; } 88%{ opacity:.5; }
    100%{ transform:translateY(110vh) rotate(680deg); opacity:0; }
  }

  .scene { width:100%; max-width:460px; position:relative; z-index:2; }
  .card {
    position:relative; width:100%;
    background:linear-gradient(170deg, #221b11 0%, var(--card) 100%);
    border:1px solid rgba(184,146,60,.32);
    padding:3.4rem 2.4rem 3.2rem; text-align:center; overflow:hidden;
    box-shadow:0 50px 110px -40px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.04);
  }
  .card::before { content:''; position:absolute; inset:12px; border:1px solid rgba(184,146,60,.16); pointer-events:none; }

  .rev { opacity:0; transform:translateY(16px); animation:rise .8s cubic-bezier(.16,1,.3,1) forwards; }
  @keyframes rise { to { opacity:1; transform:translateY(0); } }

  .eyebrow { font-family:'Cormorant Garamond',serif; font-size:1rem; letter-spacing:.32em; text-transform:uppercase; color:var(--gold); text-indent:.32em; }

  .firstname { font-family:'Pinyon Script',cursive; font-size:clamp(3.6rem,18vw,5.6rem); line-height:.9; margin-top:.8rem;
    background:linear-gradient(110deg, var(--gold) 0%, var(--gold-vivid) 35%, var(--champ) 50%, var(--gold-vivid) 65%, var(--gold) 100%);
    background-size:250% auto; -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;
    display:inline-block; animation:rise .8s cubic-bezier(.16,1,.3,1) .2s both, shine 5s ease-in-out 1.4s infinite; }
  @keyframes shine { 0%,100%{background-position:0% center;} 50%{background-position:100% center;} }

  .fete { display:flex; align-items:center; justify-content:center; gap:.8rem; margin:1.4rem auto .4rem; color:var(--gold-vivid);
    font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.16rem; }
  .fete .st { color:var(--champ); font-size:.9rem; }

  .age { font-family:'Marcellus',serif; font-size:clamp(5rem,30vw,9rem); line-height:.85; margin:.4rem 0;
    background:linear-gradient(160deg, var(--champ) 0%, var(--gold-vivid) 40%, var(--gold) 75%, #9a7a2e 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;
    display:inline-block; text-shadow:0 6px 40px rgba(212,175,97,.25); filter:drop-shadow(0 4px 16px rgba(212,175,97,.2)); }
  .ans { font-family:'Cormorant Garamond',serif; font-size:1.5rem; letter-spacing:.3em; text-transform:uppercase; color:var(--text-soft); text-indent:.3em; }

  .stars { display:flex; align-items:center; justify-content:center; gap:.7rem; margin:1.8rem auto; width:70%; }
  .stars .ln { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(184,146,60,.5)); }
  .stars .ln.r { background:linear-gradient(90deg,rgba(184,146,60,.5),transparent); }
  .stars .s { color:var(--champ); font-size:.8rem; animation:twinkle 1.6s ease-in-out infinite; }
  .stars .s:nth-child(3){animation-delay:.5s;} .stars .s:nth-child(4){animation-delay:1s;}
  @keyframes twinkle { 0%,100%{opacity:.4;transform:scale(.85);} 50%{opacity:1;transform:scale(1.15);} }

  .info { font-family:'Cormorant Garamond',serif; font-size:1.2rem; color:var(--text); line-height:1.7; }
  .info .place { font-style:italic; color:var(--gold-light); }
  .message { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.18rem; color:var(--text-soft);
    line-height:1.6; margin:1.4rem auto 0; max-width:32ch; }

  .countdown { display:flex; justify-content:center; gap:1.2rem; margin:2rem 0 .2rem; }
  .cd { display:flex; flex-direction:column; align-items:center; min-width:54px; padding:.7rem .4rem;
    border:1px solid rgba(184,146,60,.3); background:rgba(184,146,60,.06); border-radius:10px; }
  .cd .num { font-family:'Marcellus',serif; font-size:1.6rem; color:var(--gold-light); line-height:1; font-variant-numeric:tabular-nums; }
  .cd .lab { font-family:'Cormorant Garamond',serif; font-size:.66rem; letter-spacing:.16em; text-transform:uppercase; color:var(--text-faint); margin-top:.45rem; text-indent:.16em; }

  .cta { margin-top:2.3rem; display:flex; gap:.8rem; justify-content:center; flex-wrap:wrap; }
  .btn { display:inline-flex; align-items:center; gap:.5rem; font-family:'Marcellus',serif; font-size:.72rem; letter-spacing:.14em;
    text-transform:uppercase; text-indent:.14em; padding:.92rem 1.6rem; border-radius:40px; cursor:pointer; text-decoration:none; transition:all .3s ease; border:none; }
  .btn-gold { background:linear-gradient(135deg,var(--gold-vivid),var(--gold)); color:#241a08;
    box-shadow:0 8px 26px -8px rgba(212,175,97,.55); }
  .btn-gold:hover { transform:translateY(-2px); box-shadow:0 12px 32px -8px rgba(212,175,97,.7); }
  .btn-ghost { background:transparent; color:var(--text-faint); border:1px solid rgba(184,146,60,.3); }
  .btn-ghost:hover { color:var(--gold-light); border-color:var(--gold); transform:translateY(-2px); }
  .btn svg { width:15px; height:15px; }

  /* ════ GIFT BOX GATE ════ */
  #gate { position:fixed; inset:0; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:radial-gradient(120% 80% at 50% 35%, #251c10, var(--bg) 72%); text-align:center; cursor:pointer; padding:2rem;
    transition:opacity .7s ease, visibility 0s .7s; }
  #gate.opened { opacity:0; visibility:hidden; }
  .gift { width:150px; height:140px; position:relative; margin-bottom:1.8rem; transform-origin:bottom center; animation:shake 2.4s ease-in-out infinite; }
  @keyframes shake { 0%,86%,100%{transform:rotate(0);} 89%{transform:rotate(-3deg);} 92%{transform:rotate(3deg);} 95%{transform:rotate(-2deg);} 98%{transform:rotate(1deg);} }
  #gate.opening .gift { animation:giftPop .5s ease forwards; }
  @keyframes giftPop { 0%{transform:scale(1);} 40%{transform:scale(1.12) translateY(-6px);} 100%{transform:scale(.2) translateY(-30px);opacity:0;} }
  .gift .box { position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:120px; height:92px;
    background:linear-gradient(160deg, #2a2012, #1d160d); border:1px solid var(--gold); border-radius:4px;
    box-shadow:inset 0 -6px 16px rgba(0,0,0,.4), 0 12px 30px rgba(0,0,0,.5); }
  .gift .lid { position:absolute; top:30px; left:50%; transform:translateX(-50%); width:134px; height:30px;
    background:linear-gradient(160deg, #34280f, #241a0d); border:1px solid var(--gold-vivid); border-radius:5px; z-index:3;
    box-shadow:0 6px 14px rgba(0,0,0,.4); }
  .gift .ribV { position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:20px; height:92px;
    background:linear-gradient(90deg,var(--gold),var(--gold-vivid),var(--gold)); z-index:2; }
  .gift .ribH { position:absolute; top:30px; left:50%; transform:translateX(-50%); width:134px; height:14px;
    background:linear-gradient(180deg,var(--gold-vivid),var(--gold)); z-index:4; }
  .gift .bow { position:absolute; top:6px; left:50%; transform:translateX(-50%); width:54px; height:30px; z-index:5; }
  .gift .bow::before, .gift .bow::after { content:''; position:absolute; top:0; width:26px; height:30px;
    background:radial-gradient(circle at 50% 50%, var(--gold-vivid), var(--gold)); border-radius:50% 50% 50% 50%/60% 60% 40% 40%; }
  .gift .bow::before { left:0; transform:rotate(-22deg); } .gift .bow::after { right:0; transform:rotate(22deg); }
  .gift .knot { position:absolute; top:8px; left:50%; transform:translateX(-50%); width:16px; height:16px; border-radius:50%;
    background:radial-gradient(circle at 38% 34%, var(--champ), var(--gold)); z-index:6; }

  .gate-text { font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:var(--ivory); font-style:italic; }
  .gate-hint { font-family:'Marcellus',serif; font-size:.66rem; letter-spacing:.26em; text-transform:uppercase; text-indent:.26em;
    color:var(--text-faint); margin-top:1.6rem; animation:blink 2.2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:.35;} 50%{opacity:.9;} }

  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--bg-2); color:var(--ivory);
    font-family:'Cormorant Garamond',serif; font-size:1rem; padding:.8rem 1.5rem; border:1px solid rgba(184,146,60,.5); border-radius:40px;
    opacity:0; pointer-events:none; transition:all .4s ease; z-index:120; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width:430px) { .card { padding:2.8rem 1.6rem 2.8rem; } }
  @media (prefers-reduced-motion:reduce) { .rev{animation:none;opacity:1;transform:none;} .gift{animation:none;} .firstname,.age{animation:none;} }
</style>
</head>
<body>

<div class="rain" id="rain"></div>
<div class="burst" id="burst"></div>

<!-- GIFT GATE -->
<div id="gate" onclick="openGate()">
  <div class="gift">
    <div class="box"></div>
    <div class="ribV"></div>
    <div class="lid"></div>
    <div class="ribH"></div>
    <div class="bow"></div>
    <div class="knot"></div>
  </div>
  <div class="gate-text" data-f="gateText">Un cadeau t'attend…</div>
  <div class="gate-hint">Touchez pour ouvrir</div>
</div>

<!-- CARD -->
<div class="scene">
  <div class="card">
    <div class="eyebrow rev" style="animation-delay:.1s" data-f="eyebrow">Vous êtes convié(e) à l'anniversaire de</div>
    <div class="firstname rev" data-f="firstname">Lina</div>

    <div class="fete rev" style="animation-delay:.35s"><span class="st">✦</span> fête ses <span class="st">✦</span></div>
    <div class="age rev" style="animation-delay:.4s" data-f="age">40</div>
    <div class="ans rev" style="animation-delay:.5s" data-f="ans">ans</div>

    <div class="stars rev" style="animation-delay:.6s"><span class="ln"></span><span class="s">✦</span><span class="s">✦</span><span class="s">✦</span><span class="ln r"></span></div>

    <p class="info rev" style="animation-delay:.68s"><span data-f="date">Samedi 6 Juin 2026 — 20h00</span><br><span class="place" data-f="place">Rooftop Le Sofitel, Alger</span></p>
    <p class="message rev" style="animation-delay:.76s" data-f="message">« Quarante bougies, mille raisons de faire la fête. Viens danser avec nous ! »</p>

    <div class="countdown rev" style="animation-delay:.86s" id="countdown">
      <div class="cd"><span class="num" id="cd-j">––</span><span class="lab">Jours</span></div>
      <div class="cd"><span class="num" id="cd-h">––</span><span class="lab">Heures</span></div>
      <div class="cd"><span class="num" id="cd-m">––</span><span class="lab">Min</span></div>
    </div>

    <div class="cta rev" style="animation-delay:.94s">
      <button class="btn btn-gold" onclick="celebrate();toast('Génial — on compte sur toi !')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>
        Je serai là !
      </button>
      <button class="btn btn-ghost" onclick="toast('Chut… c\'est une surprise 🤫')">
        Surprise — ne rien dire à <span data-surprise>Lina</span>
      </button>
      <a class="btn btn-ghost" data-map href="https://www.google.com/maps/search/?api=1&query=Le+Sofitel+Alger" target="_blank" rel="noopener" style="color:var(--text-faint);border-color:rgba(184,146,60,.3)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.5-7-11a7 7 0 0 1 14 0c0 4.5-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>
        Itinéraire
      </a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const PALETTE=['#F0D080','#D4AF61','#B8923C','#E8A080','#F5F0E8','#8B2F3F'];
  let opened=false;

  function openGate(){
    if(opened) return; opened=true;
    const g=document.getElementById('gate');
    g.classList.add('opening');
    explode();
    setTimeout(()=>g.classList.add('opened'), 480);
  }

  // burst explosion from center
  function explode(){
    const burst=document.getElementById('burst');
    const cx=innerWidth/2, cy=innerHeight/2;
    const n=54;
    for(let i=0;i<n;i++){
      const c=document.createElement('div'); c.className='conf';
      c.style.position='absolute'; c.style.left=cx+'px'; c.style.top=cy+'px';
      c.style.background=PALETTE[i%PALETTE.length];
      const ang=(Math.PI*2)*(i/n)+ (Math.random()-.5)*.4;
      const dist=Math.random()*Math.min(innerWidth,innerHeight)*.55 + 80;
      const dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist - 40;
      const rot=Math.random()*720-360;
      c.animate([
        { transform:'translate(0,0) rotate(0deg)', opacity:1 },
        { transform:`translate(${dx}px,${dy*0.6}px) rotate(${rot/2}deg)`, opacity:1, offset:.55 },
        { transform:`translate(${dx*1.05}px,${dy+260}px) rotate(${rot}deg)`, opacity:0 }
      ], { duration:1600+Math.random()*900, easing:'cubic-bezier(.16,.7,.3,1)', fill:'forwards' });
      burst.appendChild(c);
      setTimeout(()=>c.remove(), 2700);
    }
  }
  function celebrate(){ explode(); }

  // gentle background rain
  function buildRain(){
    const r=document.getElementById('rain');
    for(let i=0;i<20;i++){
      const c=document.createElement('div'); c.className='conf';
      c.style.left=Math.random()*100+'vw';
      c.style.background=PALETTE[i%PALETTE.length];
      const sz=Math.random()*5+7; c.style.width=sz+'px'; c.style.height=(sz*1.5)+'px';
      c.style.animationDuration=(Math.random()*6+7)+'s'; c.style.animationDelay=(Math.random()*9)+'s';
      c.style.opacity=(Math.random()*.4+.4).toFixed(2);
      r.appendChild(c);
    }
  }
  buildRain();

  function syncName(){ const n=document.querySelector('[data-f="firstname"]').textContent.trim(); const s=document.querySelector('[data-surprise]'); if(s) s.textContent=n||'…'; }
  syncName();

  window.INVYTEK_CONFIG={
    theme:'confettis-or', accent:'#D4AF61', accent2:'#B8923C', backHref:'../themes.html', onChange:syncName,
    fields:[
      {key:'logo', label:'Logo (PNG transparent, optionnel)', type:'image', mount:'.card'},
      {key:'gateText', label:'Texte de la boîte cadeau', sel:'[data-f="gateText"]', type:'text'},
      {key:'eyebrow', label:'Introduction', sel:'[data-f="eyebrow"]', type:'text'},
      {key:'firstname', label:'Prénom', sel:'[data-f="firstname"]', type:'text'},
      {key:'age', label:'Âge', sel:'[data-f="age"]', type:'text'},
      {key:'ans', label:'Mot sous l\'âge', sel:'[data-f="ans"]', type:'text'},
      {key:'date', label:'Date & heure (texte)', sel:'[data-f="date"]', type:'text'},
      {key:'place', label:'Lieu', sel:'[data-f="place"]', type:'text'},
      {key:'map', label:'Lien itinéraire (Google Maps)', sel:'[data-map]', attr:'href', type:'text'},
      {key:'message', label:'Message personnalisé', sel:'[data-f="message"]', type:'textarea'},
      {key:'iso', label:'Date & heure (compte à rebours)', type:'datetime', val:'2026-06-06T20:00'}
    ]
  };

  let cdTarget=new Date('2026-06-06T20:00:00').getTime();
  window.setEventDate=function(iso){ const t=new Date(iso).getTime(); if(!isNaN(t)){ cdTarget=t; updateCountdown(); } };
  function updateCountdown(){
    let diff=cdTarget-Date.now();
    if(diff<0){ document.getElementById('countdown').style.display='none'; return; }
    document.getElementById('countdown').style.display='';
    const j=Math.floor(diff/86400000); diff%=86400000;
    const h=Math.floor(diff/3600000); diff%=3600000;
    const m=Math.floor(diff/60000);
    document.getElementById('cd-j').textContent=j;
    document.getElementById('cd-h').textContent=String(h).padStart(2,'0');
    document.getElementById('cd-m').textContent=String(m).padStart(2,'0');
  }
  updateCountdown(); setInterval(updateCountdown,30000);

  function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }

  // Safety: guarantee content is visible even if entrance animations are throttled
  setTimeout(function(){ document.querySelectorAll('.rev').forEach(function(e){ e.style.opacity='1'; e.style.transform='none'; }); }, 1700);
</script>
<script src="../assets/editor.js"></script>
</body>
</html>
