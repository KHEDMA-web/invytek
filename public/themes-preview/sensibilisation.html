<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#FBF6F4" />
<title>Journée de sensibilisation — Invytek</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:#FBF6F4; --paper:#FFFFFF; --panel:#F6EEEC;
    --cause:#E0518A; --cause-deep:#b83c6e; --cause-soft:rgba(224,81,138,.16);
    --ink:#34282b; --muted:#7a6a6e; --faint:#b0a2a5; --line:rgba(224,81,138,.22);
  }
  html { -webkit-font-smoothing:antialiased; scroll-behavior:smooth; }
  body { min-height:100vh; min-height:100dvh;
    background:radial-gradient(130% 80% at 50% -8%, #fff 0%, var(--bg) 55%), var(--bg);
    color:var(--ink); font-family:'Cormorant Garamond',serif; display:flex; align-items:center; justify-content:center;
    padding:calc(3rem + env(safe-area-inset-top)) 1.2rem calc(3rem + env(safe-area-inset-bottom)); overflow-x:hidden; }
  .scene { width:100%; max-width:450px; position:relative; z-index:2; }
  .card { position:relative; width:100%; background:linear-gradient(168deg,var(--paper),var(--panel)); border-radius:20px; padding:2.8rem 2.2rem 2.6rem; text-align:center;
    box-shadow:0 50px 100px -40px rgba(120,60,80,.3), 0 0 0 1px var(--line); overflow:hidden; }
  .card::after { content:''; position:absolute; left:0; right:0; top:0; height:4px; background:linear-gradient(90deg,var(--cause),var(--cause-deep)); }

  .rev { opacity:0; transform:translateY(14px); animation:rise .8s cubic-bezier(.16,1,.3,1) forwards; }
  @keyframes rise { to { opacity:1; transform:translateY(0); } }

  /* awareness ribbon icon */
  .ribbon-ic { width:60px; height:68px; margin:0 auto; display:block; }
  .ribbon-ic path { fill:none; stroke:var(--cause); stroke-width:7; stroke-linecap:round; stroke-linejoin:round; }
  .ribbon-ic .fill { fill:var(--cause-soft); stroke:none; }

  .kicker { font-family:'Space Grotesk',sans-serif; font-size:.66rem; font-weight:600; letter-spacing:.26em; text-transform:uppercase; color:var(--cause-deep); margin-top:1.2rem; text-indent:.26em; }
  .title { font-family:'Marcellus',serif; font-size:clamp(2rem,7.5vw,2.8rem); line-height:1.08; color:var(--ink); margin-top:.7rem; }
  .org { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.3rem; color:var(--muted); margin-top:.7rem; }

  .sep { display:flex; align-items:center; justify-content:center; gap:.8rem; margin:1.7rem auto; width:60%; }
  .sep .ln { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--line)); }
  .sep .ln.r { background:linear-gradient(90deg,var(--line),transparent); }
  .sep .dot { width:7px; height:7px; border-radius:50%; background:var(--cause); }

  .lead { font-family:'Cormorant Garamond',serif; font-size:1.22rem; color:var(--ink); line-height:1.6; max-width:32ch; margin:0 auto; }
  .when { font-family:'Marcellus',serif; font-size:1.04rem; letter-spacing:.18em; text-transform:uppercase; color:var(--cause-deep); margin-top:1.4rem; text-indent:.18em; }
  .where { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.2rem; color:var(--muted); margin-top:.5rem; }

  .countdown { display:flex; justify-content:center; gap:1.1rem; margin:1.9rem 0 .2rem; }
  .cd { display:flex; flex-direction:column; align-items:center; min-width:54px; padding:.7rem .4rem; border:1px solid var(--line); border-radius:10px; background:var(--cause-soft); }
  .cd .num { font-family:'Marcellus',serif; font-size:1.55rem; color:var(--cause-deep); line-height:1; font-variant-numeric:tabular-nums; }
  .cd .lab { font-family:'Space Grotesk',sans-serif; font-size:.56rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-top:.4rem; }

  .cta { margin-top:1.9rem; display:flex; gap:.7rem; justify-content:center; flex-wrap:wrap; }
  .btn { display:inline-flex; align-items:center; gap:.5rem; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:.72rem; letter-spacing:.08em; text-transform:uppercase;
    padding:.9rem 1.4rem; border-radius:40px; cursor:pointer; text-decoration:none; border:1px solid transparent; transition:all .25s; }
  .btn-primary { color:#fff; background:linear-gradient(135deg,var(--cause),var(--cause-deep)); box-shadow:0 10px 24px -10px var(--cause-deep); }
  .btn-primary:hover { transform:translateY(-2px); }
  .btn-ghost { color:var(--cause-deep); border-color:var(--line); }
  .btn-ghost:hover { transform:translateY(-2px); border-color:var(--cause); background:var(--cause-soft); }
  .btn svg { width:14px; height:14px; }

  /* ════ GATE ════ */
  #gate { position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center; overflow:hidden; cursor:pointer;
    background:radial-gradient(120% 80% at 50% 40%, #fff, var(--bg) 72%); transition:opacity .8s ease .4s, visibility 0s .9s; }
  #gate.opened { opacity:0; visibility:hidden; }
  .gate-stage { position:relative; z-index:4; display:flex; flex-direction:column; align-items:center; transition:opacity .5s,transform .7s; }
  #gate.opening .gate-stage { opacity:0; transform:scale(.92); }
  /* ribbon draw */
  .big-ribbon { width:120px; height:140px; }
  .big-ribbon path { fill:none; stroke:var(--cause); stroke-width:9; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:600; stroke-dashoffset:600; animation:drawR 2s ease-in-out infinite alternate; filter:drop-shadow(0 6px 14px var(--cause-soft)); }
  @keyframes drawR { 0%{stroke-dashoffset:600;} 60%,100%{stroke-dashoffset:0;} }
  #gate[data-open="halo"] .big-ribbon { display:none; }
  /* halo */
  .halo { position:relative; width:140px; height:140px; display:none; }
  #gate[data-open="halo"] .halo { display:block; }
  .halo span { position:absolute; inset:0; margin:auto; border-radius:50%; border:2px solid var(--cause); animation:ring 2.6s ease-out infinite; }
  .halo span:nth-child(2){animation-delay:.8s;} .halo span:nth-child(3){animation-delay:1.6s;}
  .halo .core { width:46px; height:46px; border:none; background:radial-gradient(circle at 38% 34%,var(--cause),var(--cause-deep)); animation:none; box-shadow:0 0 26px var(--cause-soft); }
  @keyframes ring { 0%{width:46px;height:46px;opacity:.8;} 100%{width:140px;height:140px;opacity:0;} }
  .gate-ti { font-family:'Marcellus',serif; font-size:1.2rem; letter-spacing:.2em; text-transform:uppercase; color:var(--cause-deep); margin-top:1.4rem; text-indent:.2em; }
  .gate-hint { position:absolute; bottom:9%; left:0; right:0; text-align:center; font-family:'Space Grotesk',sans-serif; font-size:.62rem; letter-spacing:.2em; text-transform:uppercase; color:var(--faint); z-index:6; animation:blink 2.2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:.4;} 50%{opacity:.9;} }

  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--cause-deep); color:#fff;
    font-family:'Cormorant Garamond',serif; font-size:1rem; padding:.8rem 1.4rem; border-radius:40px; opacity:0; pointer-events:none; transition:all .4s ease; z-index:140; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width:430px){ .card{padding:2.2rem 1.5rem;} }
  @media (prefers-reduced-motion:reduce){ .rev{animation:none;opacity:1;transform:none;} .big-ribbon path,.halo span{animation:none;stroke-dashoffset:0;} }
</style>
</head>
<body>

<!-- GATE -->
<div id="gate" data-open="ribbon" onclick="openGate()">
  <div class="gate-stage">
    <svg class="big-ribbon" viewBox="0 0 120 140"><path d="M60 130 L30 60 Q22 44 40 30 Q60 14 80 30 Q98 44 90 60 L60 130 M44 70 L76 70"/></svg>
    <div class="halo"><span class="core"></span><span></span><span></span><span></span></div>
    <div class="gate-ti" data-f="gateTi">Ensemble</div>
  </div>
  <div class="gate-hint">Touchez pour découvrir</div>
</div>

<!-- CARD -->
<div class="scene">
  <div class="card">
    <svg class="ribbon-ic rev" style="animation-delay:.08s" viewBox="0 0 120 140"><path d="M60 130 L30 60 Q22 44 40 30 Q60 14 80 30 Q98 44 90 60 L60 130 M44 70 L76 70"/></svg>
    <div class="kicker rev" style="animation-delay:.16s" data-f="kicker">Journée de sensibilisation</div>
    <div class="title rev" style="animation-delay:.24s" data-f="title">Octobre Rose</div>
    <div class="org rev" style="animation-delay:.32s" data-f="org">Dépistage du cancer du sein</div>

    <div class="sep rev" style="animation-delay:.4s"><span class="ln"></span><span class="dot"></span><span class="ln r"></span></div>

    <p class="lead rev" style="animation-delay:.46s" data-f="lead">Une matinée d'information, de dépistage gratuit et d'échange avec nos spécialistes. Votre présence compte.</p>
    <div class="when rev" style="animation-delay:.54s" data-f="when">Samedi 17 Octobre 2026 — 9h00</div>
    <div class="where rev" style="animation-delay:.6s" data-f="where">Maison de la Culture, Oran</div>

    <div class="countdown rev" style="animation-delay:.68s" id="countdown">
      <div class="cd"><span class="num" id="cd-j">––</span><span class="lab">Jours</span></div>
      <div class="cd"><span class="num" id="cd-h">––</span><span class="lab">Heures</span></div>
      <div class="cd"><span class="num" id="cd-m">––</span><span class="lab">Min</span></div>
    </div>

    <div class="cta rev" style="animation-delay:.76s">
      <button class="btn btn-primary" onclick="toast('Merci — votre soutien compte ♥')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>
        Je participe
      </button>
      <a class="btn btn-ghost" data-map href="https://www.google.com/maps/search/?api=1&query=Maison+de+la+Culture+Oran" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.5-7-11a7 7 0 0 1 14 0c0 4.5-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>
        Itinéraire
      </a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const CAUSES={rose:['#E0518A','#b83c6e'],bleu:['#3F8FD6','#2c6aa3'],violet:['#9A6FD6','#7048a8'],rouge:['#D6483F','#a3322c'],turquoise:['#1FB5A5','#138c7e']};
  let opened=false;
  function openGate(){ if(opened) return; opened=true; const g=document.getElementById('gate'); g.classList.add('opening'); setTimeout(()=>g.classList.add('opened'),800); }
  function setOpening(s){ document.getElementById('gate').setAttribute('data-open', s==='halo'?'halo':'ribbon'); }
  function setCause(c){ const v=CAUSES[c]||CAUSES.rose; const r=document.documentElement.style;
    r.setProperty('--cause',v[0]); r.setProperty('--cause-deep',v[1]); r.setProperty('--cause-soft',v[0]+'29'); r.setProperty('--line',v[0]+'38'); }

  let cdTarget=new Date('2026-10-17T09:00:00').getTime();
  window.setEventDate=function(iso){ const t=new Date(iso).getTime(); if(!isNaN(t)){ cdTarget=t; updateCountdown(); } };
  function updateCountdown(){
    let diff=cdTarget-Date.now();
    if(diff<0){ document.getElementById('countdown').style.display='none'; return; }
    document.getElementById('countdown').style.display='';
    const j=Math.floor(diff/86400000); diff%=86400000;
    const h=Math.floor(diff/3600000); diff%=3600000;
    const m=Math.floor(diff/60000);
    document.getElementById('cd-j').textContent=j;
    document.getElementById('cd-h').textContent=String(h).padStart(2,'0');
    document.getElementById('cd-m').textContent=String(m).padStart(2,'0');
  }
  updateCountdown(); setInterval(updateCountdown,30000);
  setTimeout(function(){ document.querySelectorAll('.rev').forEach(function(e){ e.style.opacity='1'; e.style.transform='none'; }); }, 1800);
  function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }

  window.INVYTEK_CONFIG={
    theme:'sensibilisation', accent:'#E0518A', accent2:'#b83c6e', backHref:'/themes',
    fields:[
      {key:'logo', label:'Logo (PNG transparent, optionnel)', type:'image', mount:'.card'},
      {key:'opening', label:'Animation d\'ouverture', type:'select', val:'ribbon', options:[{value:'ribbon',label:'Ruban de sensibilisation'},{value:'halo',label:'Halo lumineux'}]},
      {key:'cause', label:'Couleur de la cause', type:'select', val:'rose', options:[{value:'rose',label:'Rose'},{value:'bleu',label:'Bleu'},{value:'violet',label:'Violet'},{value:'rouge',label:'Rouge'},{value:'turquoise',label:'Turquoise'}]},
      {key:'kicker', label:'Type de journée', sel:'[data-f="kicker"]', type:'text'},
      {key:'title', label:'Nom de la campagne', sel:'[data-f="title"]', type:'text'},
      {key:'org', label:'Cause / sous-titre', sel:'[data-f="org"]', type:'text'},
      {key:'lead', label:'Message', sel:'[data-f="lead"]', type:'textarea'},
      {key:'when', label:'Date & heure', sel:'[data-f="when"]', type:'text'},
      {key:'where', label:'Lieu', sel:'[data-f="where"]', type:'text'},
      {key:'map', label:'Lien itinéraire (Google Maps)', sel:'[data-map]', attr:'href', type:'text'},
      {key:'iso', label:'Date & heure (compte à rebours)', type:'datetime', val:'2026-10-17T09:00'}
    ],
    onChange:function(d){ if(d.opening) setOpening(d.opening); if(d.cause) setCause(d.cause); }
  };
</script>
<script src="assets/editor.js"></script>
</body>
</html>
